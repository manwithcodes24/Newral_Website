<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#EFF6FF"/>
  <!-- iPhone frame -->
  <rect x="300" y="40" width="300" height="420" rx="44" fill="#0F172A"/>
  <rect x="316" y="70" width="268" height="360" rx="28" fill="#1E3A8A"/>
