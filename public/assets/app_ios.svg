  <rect x="380" y="82" width="140" height="22" rx="11" fill="#0F172A"/>
  <!-- Screen content - App UI -->
  <rect x="330" y="120" width="240" height="40" rx="8" fill="white" opacity="0.15"/>
  <rect x="348" y="133" width="100" height="14" rx="4" fill="white" opacity="0.6"/>
  <!-- App icon grid -->
  <rect x="332" y="178" width="48" height="48" rx="12" fill="#2563EB"/>
  <rect x="392" y="178" width="48" height="48" rx="12" fill="#7C3AED"/>
  <rect x="452" y="178" width="48" height="48" rx="12" fill="#059669"/>
  <rect x="512" y="178" width="48" height="48" rx="12" fill="#DC2626"/>
  <rect x="332" y="238" width="48" height="48" rx="12" fill="#D97706"/>
  <rect x="392" y="238" width="48" height="48" rx="12" fill="#0F172A"/>
  <rect x="452" y="238" width="48" height="48" rx="12" fill="#2563EB" opacity="0.7"/>
  <rect x="512" y="238" width="48" height="48" rx="12" fill="#1E293B"/>
  <!-- Card below -->
  <rect x="332" y="308" width="228" height="80" rx="14" fill="white" opacity="0.12"/>
  <rect x="350" y="324" width="100" height="12" rx="4" fill="white" opacity="0.5"/>
