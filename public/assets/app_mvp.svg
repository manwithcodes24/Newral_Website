<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#EFF6FF"/>
  <!-- Roadmap / sprint track -->
  <!-- Track line -->
  <line x1="100" y1="250" x2="800" y2="250" stroke="#DCE7F7" stroke-width="4" stroke-dasharray="12,8"/>
  <!-- Milestone nodes -->
  <!-- Week 1-2 -->
  <circle cx="160" cy="250" r="28" fill="#2563EB"/>
  <text x="160" y="256" text-anchor="middle" font-size="13" fill="white" font-family="system-ui,sans-serif" font-weight="600">1</text>
  <rect x="120" y="290" width="80" height="14" rx="4" fill="#0F172A" opacity="0.2"/>
  <!-- Week 3-4 -->
  <circle cx="340" cy="250" r="28" fill="#2563EB"/>
  <text x="340" y="256" text-anchor="middle" font-size="13" fill="white" font-family="system-ui,sans-serif" font-weight="600">2</text>
  <rect x="300" y="290" width="80" height="14" rx="4" fill="#0F172A" opacity="0.2"/>
  <!-- Week 5-6 -->
  <circle cx="520" cy="250" r="28" fill="#2563EB"/>
  <text x="520" y="256" text-anchor="middle" font-size="13" fill="white" font-family="system-ui,sans-serif" font-weight="600">3</text>
  <rect x="480" y="290" width="80" height="14" rx="4" fill="#0F172A" opacity="0.2"/>
  <!-- Launch -->
  <circle cx="720" cy="250" r="40" fill="#0F172A"/>
  <!-- Rocket icon simplified -->
  <polygon points="720,204 740,240 720,232 700,240" fill="white" opacity="0.9"/>
  <circle cx="720" cy="244" r="10" fill="#2563EB"/>
  <!-- Labels above nodes -->
  <rect x="120" y="195" width="80" height="24" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="300" y="195" width="80" height="24" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="480" y="195" width="80" height="24" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="666" y="180" width="108" height="24" rx="6" fill="#0F172A"/>
  <text x="720" y="196" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" opacity="0.8">LAUNCH</text>
  <!-- Sprint labels -->
  <text x="160" y="209" text-anchor="middle" font-size="10" fill="#2563EB" font-family="system-ui,sans-serif">SCOPE</text>
  <text x="340" y="209" text-anchor="middle" font-size="10" fill="#2563EB" font-family="system-ui,sans-serif">DESIGN</text>
  <text x="520" y="209" text-anchor="middle" font-size="10" fill="#2563EB" font-family="system-ui,sans-serif">BUILD</text>
  <!-- Timeline bar at bottom -->
  <rect x="100" y="380" width="700" height="14" rx="7" fill="#E2EDFF"/>
  <rect x="100" y="380" width="490" height="14" rx="7" fill="#2563EB" opacity="0.7"/>
  <text x="450" y="430" font-family="system-ui,sans-serif" font-size="12" fill="#2563EB" text-anchor="middle" opacity="0.4" letter-spacing="3">MVP IN 6–10 WEEKS</text>
</svg>
