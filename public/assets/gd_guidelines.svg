  <!-- Logo usage examples -->
  <rect x="464" y="185" width="100" height="60" rx="8" fill="#0077FF" opacity="0.1"/>
  <rect x="580" y="185" width="100" height="60" rx="8" fill="#0F172A" opacity="0.08"/>
  <rect x="464" y="262" width="100" height="60" rx="8" fill="#E2EDFF"/>
  <rect x="580" y="262" width="100" height="60" rx="8" fill="#F8FAFC" stroke="#DCE7F7" stroke-width="1.5"/>
  <rect x="464" y="340" width="216" height="10" rx="4" fill="#0F172A" opacity="0.1"/>
  <rect x="464" y="360" width="180" height="8" rx="3" fill="#0F172A" opacity="0.07"/>
