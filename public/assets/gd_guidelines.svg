  <rect x="165" y="110" width="250" height="20" rx="5" fill="white" opacity="0.5"/>
  <rect x="165" y="145" width="56" height="56" rx="10" fill="#0077FF"/>
  <rect x="233" y="145" width="56" height="56" rx="10" fill="#0F172A"/>
  <rect x="301" y="145" width="56" height="56" rx="10" fill="#60A5FA"/>
  <rect x="165" y="215" width="120" height="10" rx="4" fill="white" opacity="0.3"/>
  <rect x="165" y="235" width="90" height="8" rx="3" fill="white" opacity="0.2"/>
  <!-- Typography on left -->
  <rect x="165" y="290" width="240" height="26" rx="5" fill="white" opacity="0.15"/>
  <rect x="165" y="325" width="200" height="14" rx="4" fill="white" opacity="0.1"/>
  <rect x="165" y="348" width="220" height="14" rx="4" fill="white" opacity="0.08"/>
  <rect x="165" y="371" width="180" height="14" rx="4" fill="white" opacity="0.06"/>
  <!-- Right page (light) -->
  <rect x="464" y="100" width="200" height="18" rx="5" fill="#0F172A" opacity="0.2"/>
  <rect x="464" y="130" width="240" height="10" rx="4" fill="#0F172A" opacity="0.1"/>
