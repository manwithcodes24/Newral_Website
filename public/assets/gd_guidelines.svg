<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#F0F7FF"/>
  <!-- Book / document -->
  <rect x="140" y="70" width="300" height="380" rx="16" fill="#0F172A"/>
