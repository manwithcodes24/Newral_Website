<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#E8F2FF"/>
  <!-- Box front face -->
  <polygon points="250,160 550,160 550,420 250,420" fill="#0F172A"/>
  <!-- Box top face -->
  <polygon points="250,160 350,80 650,80 550,160" fill="#1E293B"/>
  <!-- Box right face -->
  <polygon points="550,160 650,80 650,340 550,420" fill="#0077FF" opacity="0.85"/>
  <!-- Label on front -->
  <rect x="290" y="210" width="220" height="140" rx="8" fill="white" opacity="0.1"/>
  <rect x="310" y="230" width="180" height="16" rx="4" fill="white" opacity="0.6"/>
  <rect x="310" y="255" width="120" height="10" rx="3" fill="white" opacity="0.35"/>
  <rect x="310" y="272" width="140" height="8" rx="3" fill="white" opacity="0.25"/>
  <!-- Logo mark on label -->
  <rect x="310" y="300" width="36" height="36" rx="6" fill="#0077FF"/>
  <!-- Background decorative circles -->
  <circle cx="120" cy="200" r="60" fill="#0077FF" opacity="0.07"/>
  <circle cx="790" cy="350" r="70" fill="#0077FF" opacity="0.07"/>
  <circle cx="800" cy="120" r="40" fill="#0F172A" opacity="0.05"/>
</svg>
