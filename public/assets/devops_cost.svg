<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#0F172A"/>
  <!-- Cost reduction chart -->
  <rect x="80" y="50" width="740" height="400" rx="20" fill="#1E293B"/>
  <!-- Chart header -->
  <text x="110" y="90" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8" opacity="0.6">Monthly Cloud Spend</text>
  <rect x="110" y="68" width="6" height="6" rx="2" fill="#EF4444" opacity="0.6"/>
  <!-- Down arrow / savings badge -->
  <rect x="660" y="60" width="140" height="52" rx="14" fill="#064E3B"/>
  <text x="730" y="84" font-family="system-ui,sans-serif" font-size="22" fill="#10B981" text-anchor="middle" font-weight="700">-42%</text>
  <text x="730" y="103" font-family="system-ui,sans-serif" font-size="11" fill="#34D399" text-anchor="middle" opacity="0.7">saved</text>
  <!-- Bar chart: Before (high bars in red) / After (lower bars in green) -->
  <!-- Month labels -->
  <text x="148" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">Jan</text>
  <text x="258" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">Feb</text>
  <text x="368" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">Mar</text>
  <text x="478" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">Apr</text>
  <text x="588" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">May</text>
  <text x="698" y="395" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle" opacity="0.4">Jun</text>
  <!-- Grid lines -->
  <line x1="110" y1="370" x2="780" y2="370" stroke="#334155" stroke-width="1"/>
  <line x1="110" y1="320" x2="780" y2="320" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="270" x2="780" y2="270" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="220" x2="780" y2="220" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="170" x2="780" y2="170" stroke="#334155" stroke-width="1" opacity="0.3"/>
  <!-- Before bars (red, left of each pair) - Jan-Mar high, Apr-Jun lower (Newral engaged) -->
  <rect x="118" y="155" width="44" height="215" rx="6" fill="#EF4444" opacity="0.5"/>
  <rect x="228" y="160" width="44" height="210" rx="6" fill="#EF4444" opacity="0.5"/>
  <rect x="338" y="155" width="44" height="215" rx="6" fill="#EF4444" opacity="0.5"/>
  <!-- After bars (green) - Apr-Jun -->
  <rect x="448" y="220" width="44" height="150" rx="6" fill="#10B981" opacity="0.7"/>
  <rect x="558" y="240" width="44" height="130" rx="6" fill="#10B981" opacity="0.8"/>
  <rect x="668" y="255" width="44" height="115" rx="6" fill="#10B981"/>
  <!-- Trend line -->
  <polyline points="140,163 250,165 360,162 470,225 580,245 690,263" stroke="#F59E0B" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <!-- Legend -->
  <rect x="110" y="426" width="12" height="12" rx="3" fill="#EF4444" opacity="0.6"/>
  <text x="130" y="437" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" opacity="0.5">Before</text>
  <rect x="200" y="426" width="12" height="12" rx="3" fill="#10B981"/>
  <text x="220" y="437" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" opacity="0.5">After Newral</text>
</svg>
