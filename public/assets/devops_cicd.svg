<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#0F172A"/>
  <!-- Pipeline stages -->
  <!-- Stage: Code -->
  <rect x="60" y="180" width="130" height="140" rx="16" fill="#1E293B"/>
  <rect x="78" y="200" width="94" height="10" rx="3" fill="#60A5FA" opacity="0.6"/>
  <rect x="78" y="220" width="70" height="8" rx="3" fill="#94A3B8" opacity="0.3"/>
  <rect x="78" y="238" width="80" height="8" rx="3" fill="#94A3B8" opacity="0.2"/>
  <rect x="78" y="256" width="60" height="8" rx="3" fill="#94A3B8" opacity="0.2"/>
  <text x="125" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle" opacity="0.7">CODE</text>
  <!-- Arrow -->
  <line x1="190" y1="250" x2="230" y2="250" stroke="#334155" stroke-width="2"/>
  <polygon points="226,244 238,250 226,256" fill="#334155"/>
  <!-- Stage: Build (running) -->
  <rect x="238" y="180" width="130" height="140" rx="16" fill="#1D4ED8" opacity="0.2" stroke="#1D4ED8" stroke-width="1.5"/>
  <circle cx="303" cy="232" r="22" fill="none" stroke="#3B82F6" stroke-width="3" stroke-dasharray="34,14"/>
  <text x="303" y="237" font-family="system-ui,sans-serif" font-size="10" fill="#60A5FA" text-anchor="middle">BUILD</text>
  <text x="303" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle" opacity="0.7">BUILD</text>
  <!-- Arrow -->
  <line x1="368" y1="250" x2="408" y2="250" stroke="#334155" stroke-width="2"/>
  <polygon points="404,244 416,250 404,256" fill="#334155"/>
  <!-- Stage: Test -->
  <rect x="416" y="180" width="130" height="140" rx="16" fill="#1E293B"/>
  <text x="458" y="232" font-family="system-ui,sans-serif" font-size="20" fill="#10B981">✓</text>
  <text x="500" y="232" font-family="system-ui,sans-serif" font-size="20" fill="#10B981">✓</text>
  <text x="458" y="260" font-family="system-ui,sans-serif" font-size="20" fill="#10B981">✓</text>
  <text x="500" y="260" font-family="system-ui,sans-serif" font-size="20" fill="#10B981">✓</text>
  <text x="481" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#10B981" text-anchor="middle" opacity="0.7">TEST</text>
  <!-- Arrow -->
  <line x1="546" y1="250" x2="586" y2="250" stroke="#334155" stroke-width="2"/>
  <polygon points="582,244 594,250 582,256" fill="#334155"/>
  <!-- Stage: Deploy -->
  <rect x="594" y="180" width="130" height="140" rx="16" fill="#1E293B"/>
  <polygon points="659,200 679,240 659,232 639,240" fill="#60A5FA"/>
  <text x="659" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle" opacity="0.7">DEPLOY</text>
  <!-- Arrow -->
  <line x1="724" y1="250" x2="764" y2="250" stroke="#334155" stroke-width="2"/>
  <polygon points="760,244 772,250 760,256" fill="#334155"/>
  <!-- Stage: Live -->
  <rect x="772" y="180" width="96" height="140" rx="16" fill="#064E3B" opacity="0.5"/>
  <circle cx="820" cy="235" r="20" fill="#10B981" opacity="0.3"/>
  <circle cx="820" cy="235" r="10" fill="#10B981"/>
  <text x="820" y="300" font-family="system-ui,sans-serif" font-size="11" fill="#10B981" text-anchor="middle" opacity="0.7">LIVE</text>
  <!-- Label above -->
  <text x="450" y="140" font-family="system-ui,monospace" font-size="12" fill="#60A5FA" text-anchor="middle" opacity="0.4" letter-spacing="2">CI / CD PIPELINE</text>
  <!-- Commit log at bottom -->
  <rect x="60" y="360" width="780" height="80" rx="14" fill="#1E293B"/>
  <circle cx="96" cy="392" r="8" fill="#10B981"/>
  <rect x="116" y="386" width="100" height="12" rx="3" fill="#94A3B8" opacity="0.3"/>
  <rect x="116" y="406" width="200" height="8" rx="2" fill="#94A3B8" opacity="0.2"/>
  <rect x="650" y="386" width="80" height="12" rx="3" fill="#60A5FA" opacity="0.3"/>
  <rect x="650" y="406" width="60" height="8" rx="2" fill="#94A3B8" opacity="0.2"/>
</svg>
