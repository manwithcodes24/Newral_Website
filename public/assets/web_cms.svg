<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#EFF6FF"/>
  <!-- CMS Editor layout -->
  <rect x="60" y="50" width="780" height="400" rx="20" fill="white" stroke="#DCE7F7" stroke-width="1.5"/>
  <!-- Top toolbar -->
  <rect x="60" y="50" width="780" height="50" rx="20" fill="#F8FAFC"/>
  <rect x="60" y="80" width="780" height="20" fill="#F8FAFC"/>
  <rect x="86" y="65" width="50" height="22" rx="6" fill="#3B82F6" opacity="0.15"/>
  <rect x="146" y="65" width="50" height="22" rx="6" fill="#3B82F6" opacity="0.1"/>
  <rect x="206" y="65" width="50" height="22" rx="6" fill="#3B82F6" opacity="0.1"/>
  <!-- Publish button -->
  <rect x="720" y="62" width="100" height="28" rx="8" fill="#3B82F6"/>
  <text x="770" y="80" font-family="system-ui,sans-serif" font-size="12" fill="white" text-anchor="middle">Publish</text>
  <!-- Left: content editor -->
  <rect x="86" y="118" width="480" height="30" rx="6" fill="#F1F5F9"/>
  <rect x="96" y="126" width="160" height="14" rx="4" fill="#0F172A" opacity="0.4"/>
  <rect x="86" y="160" width="480" height="12" rx="3" fill="#0F172A" opacity="0.08"/>
  <rect x="86" y="182" width="480" height="12" rx="3" fill="#0F172A" opacity="0.06"/>
  <rect x="86" y="204" width="380" height="12" rx="3" fill="#0F172A" opacity="0.05"/>
  <rect x="86" y="234" width="480" height="100" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="100" y="250" width="200" height="10" rx="3" fill="#0F172A" opacity="0.1"/>
  <rect x="100" y="268" width="280" height="10" rx="3" fill="#0F172A" opacity="0.08"/>
  <rect x="100" y="286" width="240" height="10" rx="3" fill="#0F172A" opacity="0.07"/>
  <rect x="100" y="304" width="180" height="10" rx="3" fill="#0F172A" opacity="0.06"/>
  <!-- Right: preview panel -->
  <rect x="590" y="118" width="230" height="300" rx="12" fill="#0F172A"/>
  <rect x="604" y="135" width="202" height="12" rx="4" fill="white" opacity="0.5"/>
  <rect x="604" y="157" width="202" height="8" rx="3" fill="white" opacity="0.2"/>
  <rect x="604" y="173" width="160" height="8" rx="3" fill="white" opacity="0.15"/>
  <rect x="604" y="198" width="202" height="80" rx="10" fill="#1E3A8A"/>
  <rect x="604" y="292" width="120" height="10" rx="3" fill="white" opacity="0.2"/>
  <rect x="604" y="312" width="160" height="8" rx="3" fill="white" opacity="0.12"/>
  <text x="695" y="260" font-family="system-ui,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.4">PREVIEW</text>
</svg>
